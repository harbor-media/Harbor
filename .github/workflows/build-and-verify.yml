name: Build and Verify

on:
  push:
    branches: [main]
  pull_request:
  # Allows re-running CI from the Actions tab without pushing a commit.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t harbor:ci .

      - name: Smoke test
        run: bash scripts/smoke.sh harbor:ci

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: harbor
          POSTGRES_USER: harbor
          POSTGRES_PASSWORD: harbor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harbor -d harbor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm --filter @harbor/e2e exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e
        env:
          E2E_DATABASE_URL: postgresql://harbor:harbor@localhost:5432/harbor

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
